<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>은빛캘리 마케팅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            height: 90vh;
        }

        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav-item {
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            border: 2px solid transparent;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            border-color: #667eea;
        }

        .nav-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="file"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .preview-area {
            background: #f9f9f9;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .output-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>📱 은빛캘리</h2>
            <div class="nav-item active" onclick="switchTab('post')">✏️ 새 게시물</div>
            <div class="nav-item" onclick="switchTab('schedule')">📅 예약 발행</div>
            <div class="nav-item" onclick="switchTab('stats')">📊 성과 분석</div>
            <div class="nav-item" onclick="switchTab('settings')">⚙️ 설정</div>
        </div>

        <div class="main-content">
            <!-- 새 게시물 탭 -->
            <div id="post" class="tab-content active">
                <h1>✏️ 새 게시물 작성</h1>
                
                <div class="form-group">
                    <label>사진 선택</label>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <div class="preview-area" id="previewArea">
                    <div style="color: #999;">사진을 선택하면 미리보기가 표시됩니다</div>
                </div>

                <div class="form-group">
                    <label>톤 선택</label>
                    <select id="toneSelect">
                        <option value="감성적">감성적</option>
                        <option value="정보형">정보형</option>
                        <option value="유머러스">유머러스</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="generateCaption()">✨ AI 생성해주기</button>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>AI가 캡션을 생성 중입니다...</p>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <div id="captionOutput"></div>

                <div class="form-group" style="margin-top: 30px;">
                    <label>작성 내용</label>
                    <textarea id="contentArea" placeholder="내용을 입력하거나 AI로 생성한 캡션을 수정하세요..."></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="clearForm()">초기화</button>
                    <button class="btn-primary" onclick="publishPost()">📤 발행하기</button>
                </div>
            </div>

            <!-- 예약 발행 탭 -->
            <div id="schedule" class="tab-content">
                <h1>📅 예약 발행</h1>
                <p style="color: #999; margin-bottom: 20px;">곧 업데이트됩니다!</p>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">0</div>
                        <div class="stat-label">예약된 게시물</div>
                    </div>
                </div>
            </div>

            <!-- 성과 분석 탭 -->
            <div id="stats" class="tab-content">
                <h1>📊 성과 분석</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalPosts">0</div>
                        <div class="stat-label">총 게시물</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalLikes">0</div>
                        <div class="stat-label">총 좋아요</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgEngagement">0%</div>
                        <div class="stat-label">평균 참여도</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="followers">0</div>
                        <div class="stat-label">팔로워</div>
                    </div>
                </div>
            </div>

            <!-- 설정 탭 -->
            <div id="settings" class="tab-content">
                <h1>⚙️ 설정</h1>
                <div class="form-group">
                    <label>인스타그램 계정</label>
                    <input type="text" placeholder="@eunbickaelri" value="@eunbickaelri">
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" placeholder="hun2620@naver.com" value="hun2620@naver.com">
                </div>
                <div class="button-group">
                    <button class="btn-primary">저장하기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'sk-ant-api03-iMWtVymUouv4EyUq1aKowQyQeAFh5au7pyShTWK79ZZEkP0sHIW_GJZ-iyoECTDvyiRZT4ECr_dbBX3EsUUZ3w-YN9cfwAA';

        function switchTab(tabName) {
            // 모든 탭 숨기기
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // 선택한 탭 표시
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('previewArea');
                    preview.innerHTML = `<img src="${event.target.result}" class="preview-image" alt="미리보기">`;
                };
                reader.readAsDataURL(file);
            }
        });

        async function generateCaption() {
            const tone = document.getElementById('toneSelect').value;
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-20241022',
                        max_tokens: 300,
                        messages: [
                            {
                                role: 'user',
                                content: `당신은 인스타그램 마케팅 전문가입니다. 
                                
이 사진을 위한 ${getToneDescription(tone)} 인스타그램 캡션을 작성해주세요.

요구사항:
- 길이: 150-200자
- 해시태그: 8-10개 (한국어 해시태그)
- 형식: 캡션 [줄바꿈] [줄바꿈] #해시태그들

예시:
따뜻한 오후의 한 모금 ☕
마음까지 편해지는 그런 시간...

#카페 #커피 #감성 #일상 #따뜻함 #카페투어 #커피와함께 #휴식 #감성카페`
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'API 오류 발생');
                }

                const caption = data.content[0].text;
                document.getElementById('contentArea').value = caption;

                const output = document.getElementById('captionOutput');
                output.innerHTML = `<div class="output-box">${caption}</div>`;

                successMsg.textContent = '✅ 캡션이 생성되었습니다!';
                successMsg.style.display = 'block';

            } catch (error) {
                errorMsg.textContent = '❌ 오류: ' + error.message;
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function getToneDescription(tone) {
            const map = {
                '감성적': '감정적이고 따뜻한',
                '정보형': '정보 전달 중심의 명확한',
                '유머러스': '재미있고 즐거운'
            };
            return map[tone] || '매력적인';
        }

        function clearForm() {
            document.getElementById('imageInput').value = '';
            document.getElementById('contentArea').value = '';
            document.getElementById('previewArea').innerHTML = '<div style="color: #999;">사진을 선택하면 미리보기가 표시됩니다</div>';
            document.getElementById('captionOutput').innerHTML = '';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function publishPost() {
            const content = document.getElementById('contentArea').value;
            if (!content) {
                alert('내용을 입력해주세요!');
                return;
            }
            alert('📤 게시물이 발행되었습니다!\n\n' + content);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>은빛캘리 마케팅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 100px;
            background: linear-gradient(180deg, #7c3aed 0%, #ec4899 50%, #f97316 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
        }

        .sidebar-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 24px;
            transition: all 0.3s;
        }

        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #e5e7eb;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .banner {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: #7c3aed;
        }

        .kpi-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .upload-box {
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }

        .upload-box:hover {
            border-color: #7c3aed;
            background: #f3f4f6;
        }

        .btn {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .result {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-item {
            margin-bottom: 15px;
        }

        .result-label {
            font-weight: 600;
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .result-value {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
        }

        .hashtags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .hashtag {
            background: #dbeafe;
            color: #1e40af;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #dc2626;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }

        img {
            max-width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }

        img.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-item active" onclick="switchTab('home')">📊</div>
            <div class="sidebar-item" onclick="switchTab('new')">✏️</div>
            <div class="sidebar-item" onclick="switchTab('calendar')">📅</div>
            <div class="sidebar-item" onclick="switchTab('analytics')">📈</div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>은빛캘리 마케팅</h1>
            </div>

            <div class="content">
                <!-- 홈 -->
                <div id="home" class="section active">
                    <div class="banner">
                        <h2>안녕하세요, 사장님! 👋</h2>
                        <p>오늘도 열심히 마케팅하시겠어요?</p>
                    </div>

                    <div class="kpi-container">
                        <div class="kpi-card">
                            <div class="kpi-value">18,450</div>
                            <div class="kpi-label">도달</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value">1,246</div>
                            <div class="kpi-label">좋아요</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value">89</div>
                            <div class="kpi-label">댓글</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value">3,421</div>
                            <div class="kpi-label">저장</div>
                        </div>
                    </div>
                </div>

                <!-- 새 게시물 -->
                <div id="new" class="section">
                    <h2 style="margin-bottom: 20px;">✨ AI 캡션 생성</h2>

                    <div class="form-group">
                        <label>사진 선택</label>
                        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                            <div style="font-size: 40px;">📸</div>
                            <p>클릭해서 사진을 선택하세요</p>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        <img id="preview">
                    </div>

                    <div class="form-group">
                        <label>업종</label>
                        <select id="businessType">
                            <option>공방/클래스</option>
                            <option>카페/식당</option>
                            <option>뷰티/헤어</option>
                            <option>소매/판매</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>톤</label>
                        <select id="tone">
                            <option>감성적</option>
                            <option>정보형</option>
                            <option>유머러스</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>설명 (선택)</label>
                        <textarea id="desc" placeholder="추가 설명을 입력하세요"></textarea>
                    </div>

                    <button class="btn" onclick="generateCaption()" id="genBtn">✨ AI 캡션 생성</button>

                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p>AI가 캡션을 만들고 있습니다...</p>
                    </div>

                    <div class="error" id="error"></div>

                    <div class="result" id="result">
                        <h3>📝 생성된 캡션</h3>
                        <div class="result-item">
                            <div class="result-label">캡션</div>
                            <div class="result-value" id="caption"></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">해시태그</div>
                            <div class="hashtags" id="hashtags"></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">최적 발행 시간</div>
                            <div class="result-value" id="time"></div>
                        </div>
                    </div>
                </div>

                <!-- 캘린더 -->
                <div id="calendar" class="section">
                    <h2>📅 게시물 스케줄</h2>
                    <p style="margin-top: 20px; color: #6b7280;">준비 중입니다.</p>
                </div>

                <!-- 분석 -->
                <div id="analytics" class="section">
                    <h2>📈 성과 분석</h2>
                    <p style="margin-top: 20px; color: #6b7280;">준비 중입니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let imageData = null;

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                imageData = event.target.result;
                document.getElementById('preview').src = imageData;
                document.getElementById('preview').classList.add('show');
            };
            reader.readAsDataURL(file);
        });

        async function generateCaption() {
            if (!imageData) {
                showError('사진을 먼저 선택해주세요!');
                return;
            }

            const business = document.getElementById('businessType').value;
            const toneVal = document.getElementById('tone').value;
            const desc = document.getElementById('desc').value || '새로운 게시물';

            showLoading(true);
            hideError();
            hideResult();

            try {
                const response = await fetch('/api/caption', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        caption_text: desc,
                        business_type: business,
                        tone: toneVal
                    })
                });

                if (!response.ok) throw new Error('API 오류');

                const data = await response.json();
                showResult(data);
            } catch (error) {
                showError('오류: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('genBtn').disabled = show;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function hideResult() {
            document.getElementById('result').classList.remove('show');
        }

        function showResult(data) {
            document.getElementById('caption').textContent = data.caption;
            document.getElementById('hashtags').innerHTML = data.hashtags
                .map(tag => `<span class="hashtag">${tag}</span>`)
                .join('');
            document.getElementById('time').textContent = data.recommended_time;
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>

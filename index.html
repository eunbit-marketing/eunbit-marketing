<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>은빛캘리 마케팅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 사이드바 */
        .sidebar {
            width: 100px;
            background: linear-gradient(180deg, #7c3aed 0%, #ec4899 50%, #f97316 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
        }

        .sidebar-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: all 0.3s;
        }

        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 메인 콘텐츠 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .tabs {
            width: 200px;
            background: white;
            border-right: 1px solid #e5e7eb;
            padding: 20px 0;
            overflow-y: auto;
        }

        .tab-item {
            padding: 15px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-item.active {
            background: #f3f4f6;
            border-left-color: #7c3aed;
            font-weight: 600;
        }

        .tab-item:hover {
            background: #f9fafb;
        }

        .tab-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 배너 */
        .banner {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .banner h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        /* KPI 카드 */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: #7c3aed;
            margin-bottom: 5px;
        }

        .kpi-label {
            font-size: 12px;
            color: #6b7280;
        }

        /* 폼 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #7c3aed;
            background: #f3f4f6;
        }

        .upload-area.dragover {
            border-color: #7c3aed;
            background: #f3f4f6;
        }

        /* 버튼 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 결과 섹션 */
        .result-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-box h3 {
            margin-bottom: 15px;
            color: #374151;
        }

        .result-item {
            margin-bottom: 15px;
        }

        .result-item label {
            font-weight: 600;
            color: #6b7280;
            font-size: 12px;
            display: block;
            margin-bottom: 5px;
        }

        .result-item .value {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
        }

        .hashtags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .hashtag {
            background: #dbeafe;
            color: #1e40af;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* 로딩 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: #dc2626;
            padding: 10px;
            background: #fee2e2;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .kpi-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .content-area {
                flex-direction: column;
            }
            
            .tabs {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                display: flex;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 사이드바 -->
        <div class="sidebar">
            <div class="sidebar-item active" data-tab="home" title="홈">📊</div>
            <div class="sidebar-item" data-tab="new-post" title="새 게시물">✏️</div>
            <div class="sidebar-item" data-tab="calendar" title="캘린더">📅</div>
            <div class="sidebar-item" data-tab="analytics" title="분석">📈</div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">
            <div class="header">
                <h1>은빛캘리 마케팅</h1>
                <div>👤 성훈</div>
            </div>

            <div class="content-area">
                <!-- 탭 -->
                <div class="tabs">
                    <div class="tab-item active" data-tab="home">홈</div>
                    <div class="tab-item" data-tab="new-post">새 게시물</div>
                    <div class="tab-item" data-tab="calendar">캘린더</div>
                    <div class="tab-item" data-tab="analytics">분석</div>
                </div>

                <!-- 탭 콘텐츠 -->
                <div class="tab-contents">
                    <!-- 홈 탭 -->
                    <div class="tab-content active" data-tab="home">
                        <div class="banner">
                            <h2>안녕하세요, 사장님! 👋</h2>
                            <p>오늘도 열심히 마케팅하시겠어요?</p>
                        </div>

                        <div class="kpi-container">
                            <div class="kpi-card">
                                <div class="kpi-value">18,450</div>
                                <div class="kpi-label">도달</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-value">1,246</div>
                                <div class="kpi-label">좋아요</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-value">89</div>
                                <div class="kpi-label">댓글</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-value">3,421</div>
                                <div class="kpi-label">저장</div>
                            </div>
                        </div>
                    </div>

                    <!-- 새 게시물 탭 -->
                    <div class="tab-content" data-tab="new-post">
                        <h2 style="margin-bottom: 20px;">새 게시물 작성</h2>

                        <div class="form-group">
                            <label>사진 업로드</label>
                            <div class="upload-area" id="uploadArea">
                                <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
                                <p>여기에 사진을 드래그하거나 클릭하세요</p>
                                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                            </div>
                            <img id="imagePreview" style="max-width: 100%; margin-top: 20px; display: none; border-radius: 12px;">
                        </div>

                        <div class="form-group">
                            <label>업종</label>
                            <select id="businessType">
                                <option value="공방/클래스">공방/클래스</option>
                                <option value="카페/식당">카페/식당</option>
                                <option value="뷰티/헤어">뷰티/헤어</option>
                                <option value="소매/판매">소매/판매</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>톤</label>
                            <select id="tone">
                                <option value="감성적">감성적</option>
                                <option value="정보형">정보형</option>
                                <option value="유머러스">유머러스</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>추가 설명 (선택)</label>
                            <textarea id="description" placeholder="사진에 대한 추가 설명을 입력하세요..."></textarea>
                        </div>

                        <button class="btn btn-primary" id="generateBtn">✨ AI 캡션 생성</button>

                        <div class="loading" id="loading">
                            <div class="spinner"></div>
                            <p>AI가 캡션을 만들고 있습니다...</p>
                        </div>

                        <div class="error-message" id="errorMessage"></div>

                        <div class="result-box" id="resultBox">
                            <h3>✨ AI가 만든 캡션</h3>

                            <div class="result-item">
                                <label>캡션</label>
                                <div class="value" id="captionResult"></div>
                            </div>

                            <div class="result-item">
                                <label>추천 해시태그</label>
                                <div class="hashtags" id="hashtagsResult"></div>
                            </div>

                            <div class="result-item">
                                <label>최적 발행 시간</label>
                                <div class="value" id="timeResult"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 캘린더 탭 -->
                    <div class="tab-content" data-tab="calendar">
                        <h2>게시물 스케줄</h2>
                        <p style="margin-top: 20px; color: #6b7280;">캘린더 기능은 준비 중입니다.</p>
                    </div>

                    <!-- 분석 탭 -->
                    <div class="tab-content" data-tab="analytics">
                        <h2>성과 분석</h2>
                        <p style="margin-top: 20px; color: #6b7280;">분석 기능은 준비 중입니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 탭 기능
        document.querySelectorAll('[data-tab]').forEach(item => {
            item.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;

                // 모든 탭 내용 숨기기
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });

                // 모든 탭 아이템 비활성화
                document.querySelectorAll('[data-tab]').forEach(tab => {
                    tab.classList.remove('active');
                });

                // 선택된 탭만 활성화
                e.target.classList.add('active');
                document.querySelector(`[data-tab="${tabName}"].tab-content`).classList.add('active');
            });
        });

        // 이미지 업로드
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        let uploadedImage = null;

        uploadArea.addEventListener('click', () => imageInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            handleImageUpload(files[0]);
        });

        imageInput.addEventListener('change', (e) => {
            handleImageUpload(e.target.files[0]);
        });

        function handleImageUpload(file) {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedImage = e.target.result;
                imagePreview.src = uploadedImage;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // AI 캡션 생성
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const resultBox = document.getElementById('resultBox');
        const errorMessage = document.getElementById('errorMessage');

        generateBtn.addEventListener('click', async () => {
            if (!uploadedImage) {
                showError('사진을 먼저 업로드해주세요!');
                return;
            }

            const businessType = document.getElementById('businessType').value;
            const tone = document.getElementById('tone').value;
            const description = document.getElementById('description').value || '새로운 게시물';

            loading.classList.add('show');
            resultBox.classList.remove('show');
            errorMessage.classList.remove('show');
            generateBtn.disabled = true;

            try {
                const response = await fetch('/api/caption', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        caption_text: description,
                        business_type: businessType,
                        tone: tone
                    })
                });

                if (!response.ok) {
                    throw new Error('API 호출 실패');
                }

                const data = await response.json();

                // 결과 표시
                document.getElementById('captionResult').textContent = data.caption;
                
                const hashtagsHtml = data.hashtags.map(tag => 
                    `<span class="hashtag">${tag}</span>`
                ).join('');
                document.getElementById('hashtagsResult').innerHTML = hashtagsHtml;
                
                document.getElementById('timeResult').textContent = data.recommended_time;

                resultBox.classList.add('show');
            } catch (error) {
                showError('캡션 생성 중 오류가 발생했습니다: ' + error.message);
            } finally {
                loading.classList.remove('show');
                generateBtn.disabled = false;
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>

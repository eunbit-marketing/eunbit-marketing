<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>은빛캘리 마케팅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            height: 90vh;
        }

        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav-item {
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            border: 2px solid transparent;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .nav-item:hover {
            background: #f0f0f0;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .preview-area {
            background: #f9f9f9;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
        }

        .output-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>📱 은빛캘리</h2>
            <div class="nav-item active" onclick="switchTab('post', this)">✏️ 새 게시물</div>
            <div class="nav-item" onclick="switchTab('schedule', this)">📅 예약 발행</div>
            <div class="nav-item" onclick="switchTab('stats', this)">📊 성과</div>
            <div class="nav-item" onclick="switchTab('settings', this)">⚙️ 설정</div>
        </div>

        <div class="main-content">
            <!-- 새 게시물 -->
            <div id="post" class="tab-content active">
                <h1>✏️ 새 게시물</h1>
                
                <div class="form-group">
                    <label>사진 선택</label>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <div class="preview-area" id="previewArea">
                    <div style="color: #999;">사진을 선택하면 미리보기가 표시됩니다</div>
                </div>

                <div class="form-group">
                    <label>톤 선택</label>
                    <select id="toneSelect">
                        <option value="감성적">감성적</option>
                        <option value="정보형">정보형</option>
                        <option value="유머러스">유머러스</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="generateCaption()">✨ AI 생성해주기</button>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>AI가 캡션을 생성 중...</p>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
                <div id="captionOutput"></div>

                <div class="form-group" style="margin-top: 30px;">
                    <label>작성 내용</label>
                    <textarea id="contentArea" placeholder="내용을 입력하거나 AI로 생성한 캡션을 수정하세요..."></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="clearForm()">초기화</button>
                    <button class="btn-primary" onclick="publishPost()">📤 발행하기</button>
                </div>
            </div>

            <!-- 예약 발행 -->
            <div id="schedule" class="tab-content">
                <h1>📅 예약 발행</h1>
                <p style="color: #999;">곧 업데이트됩니다!</p>
            </div>

            <!-- 성과 -->
            <div id="stats" class="tab-content">
                <h1>📊 성과 분석</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">0</div>
                        <div>게시물</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">0</div>
                        <div>좋아요</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">0</div>
                        <div>팔로워</div>
                    </div>
                </div>
            </div>

            <!-- 설정 -->
            <div id="settings" class="tab-content">
                <h1>⚙️ 설정</h1>
                <div class="form-group">
                    <label>인스타그램</label>
                    <input type="text" value="@eunbickaelri">
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" value="hun2620@naver.com">
                </div>
                <div class="button-group">
                    <button class="btn-primary">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            element.classList.add('active');
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('previewArea').innerHTML = 
                        `<img src="${event.target.result}" class="preview-image">`;
                };
                reader.readAsDataURL(file);
            }
        });

        async function generateCaption() {
            const tone = document.getElementById('toneSelect').value;
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/caption', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tone })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'API 오류');
                }

                const caption = data.caption;
                document.getElementById('contentArea').value = caption;
                document.getElementById('captionOutput').innerHTML = 
                    `<div class="output-box">${caption}</div>`;

                successMsg.textContent = '✅ 캡션 생성 완료!';
                successMsg.style.display = 'block';

            } catch (error) {
                errorMsg.textContent = '❌ 오류: ' + error.message;
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function clearForm() {
            document.getElementById('imageInput').value = '';
            document.getElementById('contentArea').value = '';
            document.getElementById('previewArea').innerHTML = 
                '<div style="color: #999;">사진을 선택하면 미리보기가 표시됩니다</div>';
            document.getElementById('captionOutput').innerHTML = '';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function publishPost() {
            const content = document.getElementById('contentArea').value;
            if (!content) {
                alert('내용을 입력해주세요!');
                return;
            }
            alert('📤 게시물이 발행되었습니다!');
        }
    </script>
</body>
</html>
